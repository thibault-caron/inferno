services:
  # ============================================
  # PostGreSQL Database
  # ============================================
  # postgres-db:
  #   image: postgres:18.3-bookworm
  #   container_name: inferno-db
  #   environment:
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_DB: ${POSTGRES_DB}
  #   ports:
  #     - "${DB_PORT}:5432"
  #   volumes:
  #     - type: volume
  #       source: inferno-data
  #       target: /var/lib/postgresql/data
  #     # - type: bind
  #     #   source: ./init.sql        
  #     #   target: /docker-entrypoint-initdb.d/init.sql
  #     #   read_only: true
  #   restart: unless-stopped

  # ============================================
  # C++ Shared library (Development)
  # ============================================
  shared:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inferno-shared
    volumes:
      - type: bind
        source: ./shared
        target: /app/shared
      - type: bind
        source: ./inferno.sh
        target: /app/inferno.sh
    command: ["bash", "./inferno.sh", "test", "shared"]

  # ============================================
  # C++ Server (Development)
  # ============================================
  server:
    depends_on:
      shared:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inferno-server
    environment:
      DB_HOST: inferno-db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - type: bind
        source: ./server
        target: /app/server
      - type: bind
        source: ./shared
        target: /app/shared
      - type: bind
        source: ./inferno.sh
        target: /app/inferno.sh
    # depends_on:
    #   - inferno-db
    command: ["bash", "./inferno.sh", "run", "server"]
    # restart: unless-stopped


  # ============================================
  # C++ Agent (Development)
  # ============================================
  agent:
    depends_on:
      shared:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inferno-agent
    environment:
      # Server configuration
      SERVER_PORT: ${SERVER_PORT}
    volumes:
      - type: bind
        source: ./agent
        target: /app/agent
      - type: bind
        source: ./shared
        target: /app/shared
      - type: bind
        source: ./inferno.sh
        target: /app/inferno.sh
    command: ["bash", "./inferno.sh", "run", "agent"]
    # restart: unless-stopped

volumes:
  inferno-data: